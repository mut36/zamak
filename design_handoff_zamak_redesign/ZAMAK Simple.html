<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZAMAK Simple</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --bg: oklch(0.987 0.006 84);
    --surface: #ffffff;
    --surface-2: oklch(0.975 0.008 84);
    --border: oklch(0.925 0.008 80);
    --border-strong: oklch(0.87 0.012 78);
    --ink: oklch(0.26 0.013 68);
    --ink-2: oklch(0.49 0.013 68);
    --ink-3: oklch(0.64 0.011 70);
    --accent: oklch(0.57 0.115 162);
    --accent-press: oklch(0.5 0.115 162);
    --accent-soft: oklch(0.955 0.035 162);
    --accent-line: oklch(0.86 0.06 162);
    --radius: 18px;
    --radius-sm: 12px;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --sans: 'Pretendard', system-ui, sans-serif;
    --shadow: 0 1px 2px oklch(0.4 0.02 80 / 0.04), 0 12px 32px oklch(0.45 0.03 80 / 0.06);
    --shadow-lg: 0 2px 4px oklch(0.4 0.02 80 / 0.04), 0 18px 48px oklch(0.45 0.03 80 / 0.09);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}
  .mono{font-family:var(--mono)}
  ::selection{background:var(--accent-soft)}

  .app{min-height:100vh;display:flex;flex-direction:column}
  .topbar{height:64px;display:flex;align-items:center;padding:0 28px;gap:14px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:-0.02em;font-size:17px}
  .backlink{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:var(--surface);display:grid;place-items:center;color:var(--ink-2);text-decoration:none;font-size:16px;margin-right:4px}
  .backlink:hover{background:var(--surface-2);color:var(--ink)}
  .mark{width:21px;height:21px;position:relative}
  .mark i{position:absolute;inset:0;border-radius:5px;background:var(--accent);transform:rotate(45deg) scale(0.64)}
  .mark i:last-child{background:var(--ink);opacity:.88;transform:rotate(45deg) scale(0.64) translate(4px,4px);mix-blend-mode:multiply}
  .lang-pill{margin-left:auto;display:flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--ink-2)}

  .main{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 24px 110px}
  .wrap{width:100%;max-width:600px}

  /* stepper */
  .stepper{display:flex;align-items:center;gap:0;margin:14px 0 34px}
  .step{display:flex;align-items:center;gap:10px;flex:none}
  .step .dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--border-strong);background:var(--surface);display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--ink-3);transition:.2s}
  .step.active .dot{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 0 0 5px var(--accent-soft)}
  .step.done .dot{border-color:var(--accent);background:var(--accent);color:#fff}
  .step .lbl{font-size:13px;font-weight:600;color:var(--ink-3)}
  .step.active .lbl{color:var(--ink)}
  .step.done .lbl{color:var(--ink-2)}
  .step-line{flex:1;height:2px;background:var(--border);margin:0 12px;border-radius:2px}
  .step-line.fill{background:var(--accent)}
  .step .dot svg{width:15px;height:15px}

  .head{text-align:center;margin-bottom:26px}
  .head h1{font-size:27px;font-weight:800;letter-spacing:-0.03em;margin:0 0 8px}
  .head p{font-size:15px;color:var(--ink-2);margin:0;line-height:1.55}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}

  /* dropzone */
  .drop{border:2px dashed var(--border-strong);border-radius:var(--radius);background:var(--surface);padding:48px 28px;text-align:center;transition:.18s;cursor:pointer}
  .drop:hover{border-color:var(--accent-line);background:var(--accent-soft)}
  .drop.over{border-color:var(--accent);background:var(--accent-soft)}
  .drop-ico{width:64px;height:64px;border-radius:18px;background:var(--accent-soft);display:grid;place-items:center;margin:0 auto 20px}
  .drop-ico svg{width:30px;height:30px;color:var(--accent)}
  .drop h3{font-size:19px;font-weight:700;margin:0 0 8px;letter-spacing:-0.01em}
  .drop p{font-size:14px;color:var(--ink-2);margin:0 0 22px}
  .fmt{font-size:12.5px;color:var(--ink-3);margin-top:18px}

  .btn{border:1px solid transparent;border-radius:13px;font-weight:700;font-size:15px;padding:13px 22px;display:inline-flex;align-items:center;justify-content:center;gap:9px;transition:.14s;white-space:nowrap;flex-shrink:0}
  .btn svg{width:18px;height:18px;flex:none}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px oklch(0.57 0.115 162 / 0.28)}
  .btn-primary:hover{background:var(--accent-press)}
  .btn-ghost{background:var(--surface);color:var(--ink);border-color:var(--border-strong)}
  .btn-ghost:hover{background:var(--surface-2)}
  .btn-block{width:100%;padding:16px;font-size:16px;border-radius:14px}
  .btn-lg{padding:15px 26px;font-size:16px}

  .qcard{padding:22px;margin-top:18px}
  .qlabel{font-size:14px;font-weight:700;margin:0 0 14px;text-align:center}
  .langgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .langbtn{border:1.5px solid var(--border-strong);background:var(--surface);border-radius:12px;padding:12px 8px;font-size:14px;font-weight:600;color:var(--ink-2);transition:.12s;display:flex;flex-direction:column;align-items:center;gap:3px}
  .langbtn .lc{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
  .langbtn:hover{border-color:var(--accent-line)}
  .langbtn.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .langbtn.on .lc{color:var(--accent)}

  .reassure{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13.5px;color:var(--ink-2);margin-top:20px;font-weight:500}
  .reassure b{color:var(--accent);font-weight:700}
  .dot-sep{width:3px;height:3px;border-radius:50%;background:var(--border-strong)}

  /* info step */
  .detected{display:flex;gap:16px;padding:18px;align-items:center;margin-bottom:16px}
  .poster{width:62px;height:88px;border-radius:10px;flex:none;background:
    repeating-linear-gradient(135deg,var(--surface-2),var(--surface-2) 7px,oklch(0.94 0.01 80) 7px,oklch(0.94 0.01 80) 14px);
    border:1px solid var(--border);display:grid;place-items:center}
  .poster span{font-family:var(--mono);font-size:8.5px;color:var(--ink-3);text-align:center;line-height:1.3;padding:4px}
  .dtitle{font-size:18px;font-weight:700;letter-spacing:-0.01em}
  .dmeta{font-size:13px;color:var(--ink-2);margin-top:4px}
  .dbadge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:4px 10px;border-radius:999px;margin-top:9px}
  .dbadge b{width:5px;height:5px;border-radius:50%;background:var(--accent)}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:7px}
  .input{width:100%;border:1.5px solid var(--border-strong);background:var(--surface);border-radius:12px;padding:12px 14px;font-size:14.5px;color:var(--ink);transition:.13s}
  .input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  textarea.input{resize:vertical;min-height:84px;line-height:1.6}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .fixrow{display:flex;align-items:center;justify-content:space-between;padding:16px 18px}
  .fixrow .l{font-size:14px;font-weight:600}
  .fixrow .r{font-size:13px;color:var(--ink-3)}

  .adv{margin-top:16px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--surface)}
  .adv-h{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;cursor:pointer;font-size:14px;font-weight:600}
  .adv-h .chev{width:16px;height:16px;color:var(--ink-3);transition:.2s}
  .adv-h.open .chev{transform:rotate(180deg)}
  .adv-body{padding:4px 18px 20px;border-top:1px solid var(--border)}
  .adv-body h5{font-size:12.5px;font-weight:600;color:var(--ink-2);margin:16px 0 9px}
  .pickrow{display:flex;gap:8px;flex-wrap:wrap}
  .pick{border:1.5px solid var(--border-strong);background:var(--surface);border-radius:10px;padding:9px 13px;font-size:13px;font-weight:600;color:var(--ink-2);display:flex;align-items:center;gap:7px}
  .pick.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .pick .rec{font-size:10px;font-weight:700;color:#fff;background:var(--accent);padding:2px 6px;border-radius:6px}

  /* progress step */
  .ring-wrap{display:flex;flex-direction:column;align-items:center;padding:18px 0 6px}
  .ring{position:relative;width:172px;height:172px}
  .ring svg{transform:rotate(-90deg)}
  .ring .pcttext{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .pn{font-size:42px;font-weight:800;letter-spacing:-0.03em;line-height:1}
  .ring .pl{font-size:12px;color:var(--ink-3);margin-top:3px;font-weight:600}
  .pstatus{font-size:17px;font-weight:700;margin-top:24px;text-align:center;letter-spacing:-0.01em}
  .psub{font-size:13.5px;color:var(--ink-2);margin-top:7px;text-align:center}
  .pline{margin-top:24px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;width:100%}
  .pline .pl-k{font-size:11.5px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px}
  .pline .pl-o{font-size:13.5px;color:var(--ink-3)}
  .pline .pl-t{font-size:15px;color:var(--ink);font-weight:600;margin-top:4px;min-height:22px}

  /* done step */
  .celebrate{text-align:center;margin-bottom:8px}
  .bigcheck{width:72px;height:72px;border-radius:50%;background:var(--accent-soft);display:grid;place-items:center;margin:0 auto 20px}
  .bigcheck svg{width:34px;height:34px;color:var(--accent)}
  .dl-card{padding:22px;text-align:center;margin-bottom:16px}
  .dl-file{display:inline-flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:11px 16px;margin-bottom:18px;max-width:100%}
  .dl-file svg{width:18px;height:18px;color:var(--accent);flex:none}
  .dl-file .nm{font-family:var(--mono);font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sumrow{display:flex;gap:10px;margin-bottom:16px}
  .sum{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:15px;text-align:center}
  .sum .v{font-size:21px;font-weight:800;letter-spacing:-0.02em}
  .sum .k{font-size:12px;color:var(--ink-3);margin-top:4px}
  .pvm{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:18px}
  .pvm-h{padding:12px 18px;font-size:13px;font-weight:700;color:var(--ink-2);border-bottom:1px solid var(--border)}
  .pvm-row{padding:12px 18px;border-bottom:1px solid var(--border)}
  .pvm-row:last-child{border-bottom:none}
  .pvm-row .o{font-size:12.5px;color:var(--ink-3)}
  .pvm-row .t{font-size:14.5px;color:var(--ink);font-weight:500;margin-top:3px}

  /* demo nav */
  .demo{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:3px;background:oklch(0.26 0.013 68 / 0.93);backdrop-filter:blur(8px);padding:4px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.2)}
  .demo button{border:none;background:transparent;color:oklch(0.84 0.01 80);font-size:11.5px;font-weight:600;padding:6px 12px;border-radius:8px}
  .demo button.on{background:rgba(255,255,255,.16);color:#fff}
  .demo .dl-tag{color:oklch(0.62 0.01 80);font-size:10px;padding:6px 8px 6px 10px;font-family:var(--mono)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const FILE = "In.Utero.S01E01.Episodio.1.2160p.HMAX.WEB-DL.DDP5.1.H.265-MeM.GP.srt";
const LANGS = [["KO","한국어"],["EN","English"],["JA","日本語"],["ES","Español"],["FR","Français"],["zh","中文"]];
const PAIRS = [
  ["¿Dónde estabas anoche?","어젯밤 어디 있었어?"],
  ["No es asunto tuyo, Marco.","네가 상관할 일 아니야, 마르코."],
  ["Lo es cuando no vuelves a casa.","집에 안 들어오면 내 일이 되지."],
  ["Estaba con ella. En el hospital.","그 사람이랑 있었어. 병원에서."],
  ["¿Con quién? Dime la verdad.","누구랑? 사실대로 말해."],
  ["Con la madre del niño.","그 아이 엄마랑."],
];

function IcoUp(){return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M5 18v2a1 1 0 001 1h12a1 1 0 001-1v-2"/></svg>;}
function IcoFile(){return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H7a2 2 0 00-2 2v16a2 2 0 002 2h10a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>;}
function IcoCheck(){return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>;}
function IcoDl(){return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v12M8 11l4 4 4-4"/><path d="M5 21h14"/></svg>;}
function IcoChev(){return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>;}
function IcoArrow(){return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>;}

function Stepper({step}){
  const steps=["파일","정보","번역","완료"];
  return (
    <div className="stepper">
      {steps.map((s,i)=>(
        <React.Fragment key={i}>
          <div className={"step "+(i===step?"active":i<step?"done":"")}>
            <span className="dot">{i<step?<IcoCheck/>:i+1}</span>
            <span className="lbl">{s}</span>
          </div>
          {i<steps.length-1 && <span className={"step-line"+(i<step?" fill":"")}></span>}
        </React.Fragment>
      ))}
    </div>
  );
}

function Topbar(){
  return (
    <div className="topbar">
      <a href="../index.html" className="backlink" title="시안 비교로">←</a>
      <div className="brand"><span className="mark"><i></i><i></i></span>ZAMAK</div>
      <div className="lang-pill">한국어</div>
    </div>
  );
}

function Upload({onNext,lang,setLang}){
  const [over,setOver]=useState(false);
  return (
    <div className="wrap">
      <div className="head">
        <h1>자막을 올려주세요</h1>
        <p>한 번의 업로드로 끝. 평균 2분이면 자연스러운 번역 자막을 받아요.</p>
      </div>
      <div className={"drop"+(over?" over":"")}
        onClick={onNext}
        onDragOver={e=>{e.preventDefault();setOver(true);}}
        onDragLeave={()=>setOver(false)}
        onDrop={e=>{e.preventDefault();setOver(false);onNext();}}>
        <div className="drop-ico"><IcoUp/></div>
        <h3>파일을 여기에 끌어다 놓으세요</h3>
        <p>또는 클릭해서 파일을 선택하세요</p>
        <button className="btn btn-primary btn-lg" onClick={e=>{e.stopPropagation();onNext();}}><IcoFile/> 파일 선택</button>
        <div className="fmt">SRT · VTT 형식 지원 · 최대 5MB</div>
      </div>
      <div className="card qcard">
        <p className="qlabel">어떤 언어로 바꿔드릴까요?</p>
        <div className="langgrid">
          {LANGS.map(([c,n])=>(
            <button key={c} className={"langbtn"+(lang===c?" on":"")} onClick={()=>setLang(c)}>
              {n}<span className="lc">{c}</span>
            </button>
          ))}
        </div>
      </div>
      <div className="reassure">
        <span>⏱ 평균 <b>2분</b> 소요</span><span className="dot-sep"></span>
        <span>타임코드 100% 보존</span><span className="dot-sep"></span>
        <span>설치 없이 바로</span>
      </div>
    </div>
  );
}

function Info({onNext,onBack,lang,setLang}){
  const [open,setOpen]=useState(false);
  const [model,setModel]=useState("flash");
  const [method,setMethod]=useState("whole");
  return (
    <div className="wrap">
      <div className="head">
        <h1>이 작품이 맞나요?</h1>
        <p>AI가 파일을 분석했어요. 맞으면 그대로, 틀리면 고쳐주세요.</p>
      </div>
      <div className="card detected">
        <div className="poster"><span>POSTER</span></div>
        <div style={{flex:1}}>
          <div className="dtitle">In Útero</div>
          <div className="dmeta">2024 · 드라마/스릴러 · 스페인</div>
          <span className="dbadge"><b></b>AI가 자동으로 찾았어요</span>
        </div>
      </div>
      <div className="card" style={{padding:22}}>
        <div className="frow">
          <div className="field"><label>제목</label><input className="input" defaultValue="In Útero"/></div>
          <div className="field"><label>개봉 연도</label><input className="input" defaultValue="2024"/></div>
        </div>
        <div className="frow">
          <div className="field"><label>장르</label><input className="input" defaultValue="드라마 · 스릴러"/></div>
          <div className="field"><label>제작 국가</label><input className="input" defaultValue="스페인"/></div>
        </div>
        <div className="field" style={{marginBottom:0}}>
          <label>참고할 내용이 있다면 <span style={{color:'var(--ink-3)',fontWeight:400}}>· 선택</span></label>
          <textarea className="input" placeholder="예: 주인공은 친구에게 반말, 의사에게는 존댓말을 써요."></textarea>
        </div>
      </div>

      <div className="adv">
        <div className={"adv-h"+(open?" open":"")} onClick={()=>setOpen(!open)}>
          <span>고급 설정 <span style={{color:'var(--ink-3)',fontWeight:500,fontSize:13}}>· AI 모델, 번역 방식</span></span>
          <span className="chev"><IcoChev/></span>
        </div>
        {open && (
          <div className="adv-body">
            <h5>도착어</h5>
            <div className="pickrow">
              {LANGS.map(([c,n])=><button key={c} className={"pick"+(lang===c?" on":"")} onClick={()=>setLang(c)}>{n}</button>)}
            </div>
            <h5>AI 모델</h5>
            <div className="pickrow">
              <button className={"pick"+(model==="lite"?" on":"")} onClick={()=>setModel("lite")}>Flash Lite</button>
              <button className={"pick"+(model==="flash"?" on":"")} onClick={()=>setModel("flash")}>Gemini 3 Flash <span className="rec">추천</span></button>
              <button className={"pick"+(model==="pro"?" on":"")} onClick={()=>setModel("pro")}>Pro</button>
            </div>
            <h5>번역 방식</h5>
            <div className="pickrow">
              <button className={"pick"+(method==="whole"?" on":"")} onClick={()=>setMethod("whole")}>전체 번역 <span className="rec">추천</span></button>
              <button className={"pick"+(method==="chunk"?" on":"")} onClick={()=>setMethod("chunk")}>빠른 분할</button>
            </div>
          </div>
        )}
      </div>

      <div style={{display:'flex',gap:10,marginTop:22}}>
        <button className="btn btn-ghost" onClick={onBack}>이전</button>
        <button className="btn btn-primary" style={{flex:1}} onClick={onNext}>번역 시작 <IcoArrow/></button>
      </div>
    </div>
  );
}

function Progress({onDone}){
  const [pct,setPct]=useState(0);
  const [idx,setIdx]=useState(0);
  const ref=useRef();
  useEffect(()=>{
    let p=0;
    ref.current=setInterval(()=>{
      p=Math.min(100,p+(p<15?2:p>88?1.2:2.8));
      setPct(Math.round(p));
      setIdx(Math.min(PAIRS.length-1,Math.floor(p/100*PAIRS.length)));
      if(p>=100){clearInterval(ref.current);setTimeout(onDone,650);}
    },150);
    return ()=>clearInterval(ref.current);
  },[]);
  const R=78, C=2*Math.PI*R;
  const status = pct<25?"파일을 분석하고 있어요":pct<92?"열심히 번역하고 있어요":"마지막으로 다듬는 중이에요";
  return (
    <div className="wrap">
      <div className="ring-wrap">
        <div className="ring">
          <svg width="172" height="172">
            <circle cx="86" cy="86" r={R} fill="none" stroke="var(--surface-2)" strokeWidth="11"/>
            <circle cx="86" cy="86" r={R} fill="none" stroke="var(--accent)" strokeWidth="11" strokeLinecap="round"
              strokeDasharray={C} strokeDashoffset={C*(1-pct/100)} style={{transition:'stroke-dashoffset .3s ease'}}/>
          </svg>
          <div className="pcttext"><div className="pn">{pct}%</div><div className="pl">번역 중</div></div>
        </div>
        <div className="pstatus">{status}</div>
        <div className="psub">{Math.round(pct/100*1243)} / 1,243줄 · 약 {Math.max(1,Math.round((100-pct)*1.2))}초 남음</div>
      </div>
      <div className="pline">
        <div className="pl-k">방금 번역한 대사</div>
        <div className="pl-o">{PAIRS[idx][0]}</div>
        <div className="pl-t">{pct>6?PAIRS[idx][1]:"…"}</div>
      </div>
      <p style={{textAlign:'center',fontSize:13,color:'var(--ink-3)',marginTop:22}}>창을 닫아도 번역은 계속 진행돼요.</p>
    </div>
  );
}

function Done({onReset,lang}){
  const dl=()=>{
    const srt=PAIRS.map((p,i)=>`${i+1}\n00:00:0${i},000 --> 00:00:0${i+2},000\n${p[1]}\n`).join("\n");
    const blob=new Blob([srt],{type:"text/plain"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=FILE.replace(".srt",`_${lang}.srt`);a.click();
  };
  return (
    <div className="wrap">
      <div className="celebrate">
        <div className="bigcheck"><IcoCheck/></div>
        <div className="head" style={{marginBottom:0}}>
          <h1>번역이 완료됐어요!</h1>
          <p>1,243줄을 2분 만에 번역했어요. 타임코드는 그대로예요.</p>
        </div>
      </div>
      <div className="card dl-card">
        <div className="dl-file"><IcoFile/><span className="nm">{FILE.replace(".srt",`_${lang}.srt`)}</span></div>
        <button className="btn btn-primary btn-block" onClick={dl}><IcoDl/> 번역 자막 다운로드</button>
      </div>
      <div className="sumrow">
        <div className="sum"><div className="v">1,243</div><div className="k">번역된 줄</div></div>
        <div className="sum"><div className="v">2분 04초</div><div className="k">걸린 시간</div></div>
        <div className="sum"><div className="v">100%</div><div className="k">타임코드 보존</div></div>
      </div>
      <div className="pvm">
        <div className="pvm-h">번역 미리보기</div>
        {PAIRS.slice(0,3).map((p,i)=>(
          <div className="pvm-row" key={i}><div className="o">{p[0]}</div><div className="t">{p[1]}</div></div>
        ))}
      </div>
      <button className="btn btn-ghost btn-block" onClick={onReset}>새 파일 번역하기</button>
    </div>
  );
}

function App(){
  const [step,setStep]=useState(0);
  const [lang,setLang]=useState("KO");
  const labels=["업로드","정보","진행","완료"];
  return (
    <div className="app">
      <Topbar/>
      <div className="main">
        <div className="wrap"><Stepper step={step}/></div>
        {step===0 && <Upload onNext={()=>setStep(1)} lang={lang} setLang={setLang}/>}
        {step===1 && <Info onNext={()=>setStep(2)} onBack={()=>setStep(0)} lang={lang} setLang={setLang}/>}
        {step===2 && <Progress onDone={()=>setStep(3)}/>}
        {step===3 && <Done onReset={()=>setStep(0)} lang={lang}/>}
      </div>
      <div className="demo">
        <span className="dl-tag">DEMO</span>
        {labels.map((s,i)=><button key={i} className={step===i?"on":""} onClick={()=>setStep(i)}>{s}</button>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
