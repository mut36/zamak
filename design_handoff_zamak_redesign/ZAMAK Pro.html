<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZAMAK Pro</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --bg: oklch(0.984 0.003 255);
    --surface: #ffffff;
    --surface-2: oklch(0.975 0.004 255);
    --border: oklch(0.918 0.006 255);
    --border-strong: oklch(0.86 0.01 255);
    --ink: oklch(0.24 0.02 258);
    --ink-2: oklch(0.46 0.02 258);
    --ink-3: oklch(0.62 0.015 258);
    --accent: oklch(0.55 0.17 256);
    --accent-press: oklch(0.48 0.17 256);
    --accent-soft: oklch(0.955 0.03 256);
    --accent-line: oklch(0.84 0.07 256);
    --good: oklch(0.62 0.13 158);
    --good-soft: oklch(0.96 0.04 158);
    --warn: oklch(0.72 0.13 70);
    --radius: 12px;
    --radius-sm: 8px;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --sans: 'Pretendard', system-ui, sans-serif;
    --shadow: 0 1px 2px oklch(0.4 0.03 258 / 0.05), 0 8px 24px oklch(0.4 0.03 258 / 0.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv01";}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}
  .mono{font-family:var(--mono);font-feature-settings:normal}
  ::selection{background:var(--accent-soft)}

  /* App shell */
  .app{min-height:100vh;display:flex;flex-direction:column}
  .topbar{height:56px;border-bottom:1px solid var(--border);background:color-mix(in oklch, var(--surface) 86%, transparent);backdrop-filter:blur(8px);display:flex;align-items:center;gap:24px;padding:0 24px;position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-0.02em;font-size:16px}
  .backlink{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);display:grid;place-items:center;color:var(--ink-2);text-decoration:none;font-size:15px;margin-right:2px}
  .backlink:hover{background:var(--surface-2);color:var(--ink)}
  .mark{width:20px;height:20px;position:relative;flex:none}
  .mark i{position:absolute;inset:0;border-radius:3px;background:var(--accent);transform:rotate(45deg) scale(0.62);}
  .mark i:last-child{background:var(--ink);opacity:0.9;transform:rotate(45deg) scale(0.62) translate(4px,4px);mix-blend-mode:multiply}
  .nav{display:flex;gap:2px;margin-left:6px}
  .nav a{font-size:13px;color:var(--ink-2);text-decoration:none;padding:6px 11px;border-radius:7px;font-weight:500}
  .nav a.active{color:var(--ink);background:var(--surface-2)}
  .nav a:hover{color:var(--ink)}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .lang-pill{display:flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;color:var(--ink-2)}
  .lang-pill .mono{font-size:11px;color:var(--ink-3)}
  .plan{font-size:11px;font-weight:700;letter-spacing:0.03em;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-line);padding:4px 8px;border-radius:6px}
  .avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,oklch(0.6 0.13 256),oklch(0.5 0.16 290));color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center}

  .main{flex:1;display:flex;justify-content:center;padding:32px 24px 96px}
  .canvas{width:100%;max-width:1080px}

  .crumb{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-3);margin-bottom:14px}
  .crumb .mono{font-size:11px}
  .h1{font-size:22px;font-weight:800;letter-spacing:-0.02em;margin:0 0 2px}
  .sub{font-size:13.5px;color:var(--ink-2);margin:0}
  .pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
  .grid2{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}

  /* Dropzone */
  .drop{border:1.5px dashed var(--border-strong);border-radius:var(--radius);background:var(--surface);padding:40px 28px;text-align:center;transition:.15s;position:relative}
  .drop.over{border-color:var(--accent);background:var(--accent-soft)}
  .drop-ico{width:46px;height:46px;border-radius:11px;background:var(--accent-soft);border:1px solid var(--accent-line);display:grid;place-items:center;margin:0 auto 16px}
  .drop-ico svg{width:22px;height:22px;color:var(--accent)}
  .drop h3{font-size:16px;font-weight:700;margin:0 0 6px;letter-spacing:-0.01em}
  .drop p{font-size:13px;color:var(--ink-2);margin:0 0 18px}
  .btn{border:1px solid transparent;border-radius:9px;font-weight:600;font-size:13.5px;padding:10px 16px;display:inline-flex;align-items:center;gap:8px;transition:.13s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-press)}
  .btn-ghost{background:var(--surface);color:var(--ink);border-color:var(--border-strong)}
  .btn-ghost:hover{background:var(--surface-2)}
  .btn-lg{padding:13px 18px;font-size:14.5px;border-radius:10px;width:100%;justify-content:center}
  .btn[disabled]{opacity:.5;cursor:not-allowed}
  .btn{white-space:nowrap;flex-shrink:0}
  .btn svg{width:16px;height:16px;flex:none}
  .fmtline{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:16px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--border);padding:4px 8px;border-radius:6px}

  .side-card{padding:16px}
  .side-card h4{font-size:12px;font-weight:700;color:var(--ink-2);margin:0 0 12px;letter-spacing:0.01em;text-transform:uppercase;font-size:11px}
  .recent{display:flex;flex-direction:column}
  .recent-item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;cursor:pointer}
  .recent-item:hover{background:var(--surface-2)}
  .recent-dot{width:7px;height:7px;border-radius:50%;flex:none}
  .recent-name{font-family:var(--mono);font-size:11.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .recent-meta{font-size:11px;color:var(--ink-3);flex:none}

  /* Field */
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
  .input{width:100%;border:1px solid var(--border-strong);background:var(--surface);border-radius:var(--radius-sm);padding:9px 11px;font-size:13.5px;color:var(--ink);transition:.13s}
  .input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  textarea.input{resize:vertical;min-height:78px;line-height:1.55}
  .detect{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:var(--accent);margin-left:6px;vertical-align:middle}
  .detect b{width:5px;height:5px;border-radius:50%;background:var(--accent);display:inline-block}

  .filebar{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--good);background:var(--good-soft);border-radius:10px;margin-bottom:22px}
  .filebar .fi{width:30px;height:30px;border-radius:7px;background:#fff;border:1px solid var(--good);display:grid;place-items:center;flex:none}
  .filebar .fi svg{width:15px;height:15px;color:var(--good)}
  .filebar .fname{font-family:var(--mono);font-size:12.5px;font-weight:600;color:oklch(0.4 0.08 158);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .filebar .meta{font-size:11px;color:var(--ink-3);flex:none}
  .icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border-strong);background:#fff;display:grid;place-items:center;color:var(--ink-2)}
  .icon-btn:hover{background:var(--surface-2);color:var(--ink)}
  .icon-btn svg{width:15px;height:15px}

  .sec-title{font-size:14px;font-weight:700;letter-spacing:-0.01em;margin:0 0 2px}
  .sec-desc{font-size:12.5px;color:var(--ink-3);margin:0 0 14px}

  .rail{padding:18px;position:sticky;top:88px}
  .rail h4{font-size:11px;text-transform:uppercase;letter-spacing:0.04em;font-weight:700;color:var(--ink-3);margin:0 0 10px}
  .rail .blk + .blk{margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}

  /* segmented / select */
  .seg{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px}
  .seg button{flex:1;border:none;background:transparent;border-radius:6px;padding:7px 8px;font-size:12.5px;font-weight:600;color:var(--ink-2)}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px oklch(0.4 0 0 /.08)}

  .selrow{position:relative}
  .selrow select{appearance:none;width:100%;border:1px solid var(--border-strong);background:#fff;border-radius:8px;padding:9px 32px 9px 11px;font-size:13px;font-weight:600;color:var(--ink)}
  .selrow:after{content:"";position:absolute;right:12px;top:50%;width:7px;height:7px;border-right:1.6px solid var(--ink-3);border-bottom:1.6px solid var(--ink-3);transform:translateY(-65%) rotate(45deg);pointer-events:none}
  .langflag{font-family:var(--mono)}

  .modelopt{display:flex;flex-direction:column;gap:8px}
  .model{border:1px solid var(--border-strong);border-radius:10px;padding:11px 12px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:.12s;background:#fff}
  .model:hover{border-color:var(--border-strong)}
  .model.on{border-color:var(--accent);background:var(--accent-soft)}
  .radio{width:16px;height:16px;border-radius:50%;border:1.6px solid var(--border-strong);flex:none;display:grid;place-items:center}
  .model.on .radio{border-color:var(--accent)}
  .model.on .radio:after{content:"";width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .model .mn{font-size:13px;font-weight:700;letter-spacing:-0.01em}
  .model .mt{font-size:11px;color:var(--ink-3);margin-top:1px}
  .meter{display:flex;gap:3px;margin-left:auto}
  .meter i{width:5px;height:14px;border-radius:2px;background:var(--border-strong)}
  .meter i.f{background:var(--accent)}

  .estimate{font-family:var(--mono);font-size:12px;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;line-height:1.7}
  .estimate b{color:var(--ink);font-weight:700}

  /* progress */
  .prog-wrap{max-width:760px;margin:0 auto}
  .prog-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
  .pct{font-family:var(--mono);font-size:40px;font-weight:700;letter-spacing:-0.03em;line-height:1}
  .prog-status{font-size:13px;color:var(--ink-2);font-weight:600}
  .bar{height:8px;border-radius:6px;background:var(--surface-2);overflow:hidden;border:1px solid var(--border)}
  .bar > i{display:block;height:100%;background:var(--accent);border-radius:6px;transition:width .3s ease}
  .stages{display:flex;gap:0;margin:22px 0 24px}
  .stage{flex:1;display:flex;flex-direction:column;gap:7px;position:relative;padding-right:8px}
  .stage .sd{width:11px;height:11px;border-radius:50%;border:2px solid var(--border-strong);background:#fff;z-index:2}
  .stage.done .sd{background:var(--good);border-color:var(--good)}
  .stage.active .sd{border-color:var(--accent);background:var(--accent)}
  .stage .line{position:absolute;top:5px;left:11px;right:0;height:2px;background:var(--border)}
  .stage.done .line{background:var(--good)}
  .stage .sl{font-size:12px;font-weight:600;color:var(--ink-2)}
  .stage .st{font-family:var(--mono);font-size:10.5px;color:var(--ink-3)}
  .stage.active .sl{color:var(--ink)}
  .stream{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff}
  .stream-h{display:flex;font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;font-weight:700;color:var(--ink-3);background:var(--surface-2);border-bottom:1px solid var(--border)}
  .stream-h div{flex:1;padding:8px 14px}
  .stream-h div:first-child{border-right:1px solid var(--border)}
  .srow{display:flex;border-bottom:1px solid var(--border);animation:fade .35s ease}
  .srow:last-child{border-bottom:none}
  .srow > div{flex:1;padding:9px 14px;font-size:12.5px;line-height:1.5}
  .srow > div:first-child{border-right:1px solid var(--border);color:var(--ink-3)}
  .srow .tc{font-family:var(--mono);font-size:10px;color:var(--ink-3);display:block;margin-bottom:2px}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .readout{display:flex;gap:20px;margin-top:16px;font-family:var(--mono);font-size:11.5px;color:var(--ink-3)}
  .readout b{color:var(--ink);font-weight:700}

  /* done */
  .done-wrap{max-width:760px;margin:0 auto}
  .done-head{display:flex;align-items:center;gap:13px;margin-bottom:22px}
  .check{width:38px;height:38px;border-radius:50%;background:var(--good-soft);border:1px solid var(--good);display:grid;place-items:center;flex:none}
  .check svg{width:19px;height:19px;color:var(--good)}
  .dl-card{padding:18px;display:flex;align-items:center;gap:16px;margin-bottom:18px}
  .dl-card .fi{width:42px;height:42px;border-radius:9px;background:var(--accent-soft);border:1px solid var(--accent-line);display:grid;place-items:center;flex:none}
  .dl-card .fi svg{width:20px;height:20px;color:var(--accent)}
  .dl-name{font-family:var(--mono);font-size:13px;font-weight:600}
  .dl-meta{font-size:11.5px;color:var(--ink-3);margin-top:2px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  .stat{border:1px solid var(--border);border-radius:10px;padding:13px 14px;background:#fff}
  .stat .sv{font-family:var(--mono);font-size:19px;font-weight:700;letter-spacing:-0.02em}
  .stat .sk{font-size:11px;color:var(--ink-3);margin-top:3px}
  .preview-card{overflow:hidden}
  .pv-h{padding:11px 16px;font-size:12px;font-weight:700;color:var(--ink-2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .actions{display:flex;gap:10px;margin-top:18px}

  /* demo nav */
  .demo{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:3px;background:oklch(0.22 0.02 258 / 0.92);backdrop-filter:blur(8px);padding:4px;border-radius:11px;box-shadow:0 8px 24px rgba(0,0,0,.22)}
  .demo button{border:none;background:transparent;color:oklch(0.82 0.01 258);font-size:11.5px;font-weight:600;padding:6px 12px;border-radius:8px;font-family:var(--sans)}
  .demo button.on{background:rgba(255,255,255,.16);color:#fff}
  .demo .dl-tag{color:oklch(0.6 0.01 258);font-size:10px;padding:6px 8px 6px 10px;font-family:var(--mono)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const FILE = "In.Utero.S01E01.Episodio.1.2160p.HMAX.WEB-DL.DDP5.1.H.265-MeM.GP.srt";
const LANGS = [["KO","한국어"],["EN","English"],["JA","日本語"],["ES","Español"],["FR","Français"],["zh","中文"]];
const MODELS = [
  {id:"lite", name:"Gemini 3.1 Flash Lite", tag:"빠름 · 경제적", speed:4, quality:2},
  {id:"flash", name:"Gemini 3 Flash", tag:"속도·품질 균형", speed:3, quality:3},
  {id:"pro", name:"Gemini 3.1 Pro", tag:"최고 품질 · 정밀", speed:2, quality:4},
];
const PAIRS = [
  ["00:00:02,100","¿Dónde estabas anoche?","어젯밤 어디 있었어?"],
  ["00:00:04,300","No es asunto tuyo, Marco.","네가 상관할 일 아니야, 마르코."],
  ["00:00:07,000","Lo es cuando no vuelves a casa.","집에 안 들어오면 내 일이 되지."],
  ["00:00:10,420","Estaba con ella. En el hospital.","그 사람이랑 있었어. 병원에서."],
  ["00:00:13,900","¿Con quién? Dime la verdad.","누구랑? 사실대로 말해."],
  ["00:00:16,540","Con la madre del niño.","그 아이 엄마랑."],
];

function Meter({val}){
  return <div className="meter">{[0,1,2,3].map(i=><i key={i} className={i<val?"f":""}/>)}</div>;
}
function IcoUpload(){return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M5 18v2a1 1 0 001 1h12a1 1 0 001-1v-2"/></svg>;}
function IcoFile(){return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H7a2 2 0 00-2 2v16a2 2 0 002 2h10a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>;}
function IcoCheck(){return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>;}
function IcoDl(){return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v12M8 11l4 4 4-4"/><path d="M5 21h14"/></svg>;}
function IcoSwap(){return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7h13l-3-3M21 17H8l3 3"/></svg>;}

function Topbar(){
  return (
    <div className="topbar">
      <a href="../index.html" className="backlink" title="시안 비교로">←</a>
      <div className="brand"><span className="mark"><i></i><i></i></span>ZAMAK</div>
      <nav className="nav">
        <a className="active" href="#">번역</a>
        <a href="#">용어집</a>
        <a href="#">기록</a>
        <a href="#">팀</a>
      </nav>
      <div className="top-right">
        <div className="lang-pill">KO → <span className="mono">KO</span></div>
        <span className="plan">PRO</span>
        <div className="avatar">RM</div>
      </div>
    </div>
  );
}

function Upload({onPick, lang, setLang}){
  const [over,setOver]=useState(false);
  return (
    <div className="canvas">
      <div className="crumb"><span>워크스페이스</span><span>/</span><span className="mono">새 작업</span></div>
      <div className="pagehead">
        <div><h1 className="h1">새 번역 작업</h1><p className="sub">자막 파일을 업로드하면 메타데이터를 자동 분석하고 번역 작업을 구성합니다.</p></div>
      </div>
      <div className="grid2">
        <div>
          <div className={"drop"+(over?" over":"")}
            onDragOver={e=>{e.preventDefault();setOver(true);}}
            onDragLeave={()=>setOver(false)}
            onDrop={e=>{e.preventDefault();setOver(false);onPick();}}>
            <div className="drop-ico"><IcoUpload/></div>
            <h3>자막 파일을 끌어다 놓으세요</h3>
            <p>여러 파일을 한 번에 올려 배치로 처리할 수 있어요.</p>
            <button className="btn btn-primary" onClick={onPick}><IcoFile/> 파일 선택</button>
            <div className="fmtline">
              <span className="chip">.srt</span><span className="chip">.vtt</span><span className="chip">.ass</span>
              <span style={{fontSize:'11px',color:'var(--ink-3)'}}>최대 5MB · UTF-8</span>
            </div>
          </div>
          <div style={{marginTop:16}} className="card field">
            <div style={{padding:16}}>
              <label>도착어 <span className="detect"><b></b>다국어 지원</span></label>
              <div className="selrow">
                <select value={lang} onChange={e=>setLang(e.target.value)}>
                  {LANGS.map(([c,n])=><option key={c} value={c}>{n} ({c})</option>)}
                </select>
              </div>
            </div>
          </div>
        </div>
        <div className="card side-card">
          <h4>최근 작업</h4>
          <div className="recent">
            {[["The.Bear.S03E04.srt","완료","var(--good)","2분 전"],
              ["Senna.E01.WEB-DL.srt","완료","var(--good)","어제"],
              ["Ripley.S01E02.vtt","검수 대기","var(--warn)","2일 전"]].map((r,i)=>(
              <div className="recent-item" key={i} onClick={onPick}>
                <span className="recent-dot" style={{background:r[2]}}></span>
                <span className="recent-name">{r[0]}</span>
                <span className="recent-meta">{r[3]}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function Config({lang,setLang,onStart,onReset}){
  const [model,setModel]=useState("flash");
  const [method,setMethod]=useState("whole");
  const meta=[["제목","In Útero",true],["개봉 연도","2024",true],["장르","드라마 · 스릴러",true],["제작 국가","스페인",true],["시대 배경","현대",false]];
  return (
    <div className="canvas">
      <div className="crumb"><span>워크스페이스</span><span>/</span><span className="mono">새 작업</span><span>/</span><span style={{color:'var(--ink-2)'}}>구성</span></div>
      <div className="filebar">
        <span className="fi"><IcoFile/></span>
        <span className="fname">{FILE}</span>
        <span className="meta">1,243줄 · SRT · 48KB</span>
        <button className="btn btn-ghost" style={{padding:'7px 12px',fontSize:12}} onClick={onReset}>파일 변경</button>
      </div>
      <div className="grid2">
        <div className="card" style={{padding:20}}>
          <h3 className="sec-title">작품 정보 <span className="detect"><b></b>AI 자동 감지됨</span></h3>
          <p className="sec-desc">번역 품질을 높이기 위해 사용됩니다. 잘못된 정보가 있으면 수정하세요.</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {meta.map((m,i)=>(
              <div className="field" key={i} style={i===4?{gridColumn:'1 / -1'}:null}>
                <label>{m[0]}{m[2]&&<span className="detect"><b></b>감지</span>}</label>
                <input className="input" defaultValue={m[1]} />
              </div>
            ))}
            <div className="field" style={{gridColumn:'1 / -1'}}>
              <label>추가 컨텍스트 <span style={{color:'var(--ink-3)',fontWeight:400}}>· 선택</span></label>
              <textarea className="input" placeholder="등장인물 말투·호칭, 고유명사 표기, 배경 설정 등 번역에 참고할 내용을 입력하세요."></textarea>
            </div>
          </div>
        </div>

        <div className="card rail">
          <div className="blk">
            <h4>도착어</h4>
            <div className="selrow">
              <select value={lang} onChange={e=>setLang(e.target.value)}>
                {LANGS.map(([c,n])=><option key={c} value={c}>{n} ({c})</option>)}
              </select>
            </div>
          </div>
          <div className="blk">
            <h4>AI 모델</h4>
            <div className="modelopt">
              {MODELS.map(m=>(
                <div key={m.id} className={"model"+(model===m.id?" on":"")} onClick={()=>setModel(m.id)}>
                  <span className="radio"></span>
                  <div><div className="mn">{m.name}</div><div className="mt">{m.tag}</div></div>
                  <Meter val={model===m.id?m.quality:m.quality}/>
                </div>
              ))}
            </div>
          </div>
          <div className="blk">
            <h4>번역 방식</h4>
            <div className="seg">
              <button className={method==="whole"?"on":""} onClick={()=>setMethod("whole")}>전체 번역</button>
              <button className={method==="chunk"?"on":""} onClick={()=>setMethod("chunk")}>청크 병렬</button>
            </div>
            <p style={{fontSize:11.5,color:'var(--ink-3)',margin:'8px 2px 0',lineHeight:1.5}}>
              {method==="whole"?"파일 전체를 한 컨텍스트로 번역 — 문맥 일관성이 가장 높습니다.":"구간을 나눠 병렬 처리 — 긴 파일에서 더 빠릅니다."}
            </p>
          </div>
          <div className="blk">
            <div className="estimate">
              예상 소요 <b>~2분 10초</b><br/>
              <b>1,243</b>줄 · <b>~38K</b> 토큰<br/>
              모델 <b>{MODELS.find(m=>m.id===model).name.replace('Gemini ','')}</b>
            </div>
            <button className="btn btn-primary btn-lg" style={{marginTop:12}} onClick={onStart}>번역 시작</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Progress({onDone}){
  const [pct,setPct]=useState(0);
  const [rows,setRows]=useState([]);
  const ref=useRef();
  useEffect(()=>{
    let p=0,r=0;
    ref.current=setInterval(()=>{
      p=Math.min(100,p+ (p<20?2.2: p>85?1.4:3.1));
      setPct(Math.round(p));
      const target=Math.floor((p/100)*PAIRS.length);
      if(target>r){ r=target; setRows(PAIRS.slice(0,r)); }
      if(p>=100){clearInterval(ref.current); setTimeout(onDone,650);}
    },140);
    return ()=>clearInterval(ref.current);
  },[]);
  const stages=[["분석",20],["번역",85],["검수",97],["패키징",100]];
  return (
    <div className="canvas">
      <div className="prog-wrap">
        <div className="prog-top">
          <div className="pct">{pct}<span style={{fontSize:20,color:'var(--ink-3)'}}>%</span></div>
          <div className="prog-status">{pct<100?"번역 중…":"마무리 중…"} <span className="mono" style={{color:'var(--ink-3)',marginLeft:6}}>{FILE.slice(0,28)}…</span></div>
        </div>
        <div className="bar"><i style={{width:pct+"%"}}></i></div>
        <div className="stages">
          {stages.map((s,i)=>{
            const st = pct>=s[1]?"done":(pct>=(stages[i-1]?.[1]||0)?"active":"");
            return <div key={i} className={"stage "+st}>
              {i<stages.length-1 && <span className="line"></span>}
              <span className="sd"></span><span className="sl">{s[0]}</span>
              <span className="st">{st==="done"?"완료":st==="active"?"진행 중":"대기"}</span>
            </div>;
          })}
        </div>
        <div className="stream">
          <div className="stream-h"><div>원문 · ES</div><div>번역 · KO</div></div>
          {rows.length===0 && <div className="srow"><div style={{color:'var(--ink-3)'}}>대기 중…</div><div></div></div>}
          {rows.slice(-4).map((p,i)=>(
            <div className="srow" key={i}>
              <div><span className="tc">{p[0]}</span>{p[1]}</div>
              <div style={{color:'var(--ink)'}}><span className="tc">{p[0]}</span>{p[2]}</div>
            </div>
          ))}
        </div>
        <div className="readout">
          <span>처리 <b>{Math.round(pct/100*1243)}</b>/1,243줄</span>
          <span>속도 <b>~9.4</b> 줄/s</span>
          <span>남은 시간 <b>{Math.max(0,Math.round((100-pct)*1.3))}</b>s</span>
        </div>
        <div style={{marginTop:22,textAlign:'center'}}>
          <button className="btn btn-ghost" onClick={onDone} style={{fontSize:12.5}}>백그라운드로 보내기</button>
        </div>
      </div>
    </div>
  );
}

function Done({onReset,lang}){
  const dl=()=>{
    const srt = PAIRS.map((p,i)=>`${i+1}\n${p[0]} --> ${p[0]}\n${p[2]}\n`).join("\n");
    const blob=new Blob([srt],{type:"text/plain"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=FILE.replace(".srt",`_${lang}.srt`);a.click();
  };
  return (
    <div className="canvas">
      <div className="done-wrap">
        <div className="done-head">
          <span className="check"><IcoCheck/></span>
          <div><h1 className="h1" style={{marginBottom:2}}>번역 완료</h1><p className="sub">SRT 타임코드를 그대로 유지하며 1,243줄을 번역했습니다.</p></div>
        </div>
        <div className="card dl-card">
          <span className="fi"><IcoFile/></span>
          <div style={{flex:1,minWidth:0}}>
            <div className="dl-name">{FILE.replace(".srt",`_${lang}.srt`)}</div>
            <div className="dl-meta">SRT · 49KB · UTF-8 · 1,243줄</div>
          </div>
          <button className="btn btn-ghost" style={{padding:'9px 13px'}}>미리보기</button>
          <button className="btn btn-primary" onClick={dl}><IcoDl/> 다운로드</button>
        </div>
        <div className="stats">
          {[["1,243","번역된 줄"],["2분 04초","소요 시간"],["3.1 Flash","사용 모델"],["100%","타임코드 보존"]].map((s,i)=>(
            <div className="stat" key={i}><div className="sv">{s[0]}</div><div className="sk">{s[1]}</div></div>
          ))}
        </div>
        <div className="card preview-card">
          <div className="pv-h"><span>번역 미리보기</span><span className="mono" style={{fontSize:11,color:'var(--ink-3)'}}>ES → KO</span></div>
          <div className="stream" style={{border:'none',borderRadius:0}}>
            <div className="stream-h"><div>원문</div><div>번역</div></div>
            {PAIRS.slice(0,4).map((p,i)=>(
              <div className="srow" key={i}>
                <div><span className="tc">{p[0]}</span>{p[1]}</div>
                <div style={{color:'var(--ink)'}}><span className="tc">{p[0]}</span>{p[2]}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="actions">
          <button className="btn btn-ghost" onClick={onReset}><IcoSwap/> 새 작업</button>
          <button className="btn btn-ghost">재번역</button>
          <button className="btn btn-ghost">팀과 공유</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [screen,setScreen]=useState("upload");
  const [lang,setLang]=useState("KO");
  const screens=["upload","config","progress","done"];
  const labels={upload:"업로드",config:"설정",progress:"진행",done:"완료"};
  return (
    <div className="app">
      <Topbar/>
      <div className="main">
        {screen==="upload" && <Upload onPick={()=>setScreen("config")} lang={lang} setLang={setLang}/>}
        {screen==="config" && <Config lang={lang} setLang={setLang} onStart={()=>setScreen("progress")} onReset={()=>setScreen("upload")}/>}
        {screen==="progress" && <Progress onDone={()=>setScreen("done")}/>}
        {screen==="done" && <Done onReset={()=>setScreen("upload")} lang={lang}/>}
      </div>
      <div className="demo">
        <span className="dl-tag">DEMO</span>
        {screens.map(s=><button key={s} className={screen===s?"on":""} onClick={()=>setScreen(s)}>{labels[s]}</button>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
